# CPU-only services. GPU tools (llama.cpp, whisper.cpp, Qdrant binary) run native for max perf.
#
# Ports are read from tools/compose/.env (generated by scripts/setup-docker.ps1 from models.psd1).
# To change a port, set it in config/user.psd1, then re-run: .\scripts\setup-docker.ps1
#
# Start:   .\scripts\setup-docker.ps1
#   or:    llm services start
# Stop:    llm services stop
# Status:  llm services status
# Logs:    llm services logs

services:
  langfuse-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - ${REPO_PATH}/tools/langfuse-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    ports:
      - "${LANGFUSE_PORT}:3000"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      NEXTAUTH_SECRET: local-llm-langfuse-secret
      SALT: local-llm-salt-1234
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: local
      LANGFUSE_INIT_ORG_NAME: local-llm
      LANGFUSE_INIT_USER_EMAIL: admin@local.dev
      LANGFUSE_INIT_USER_PASSWORD: admin123
      LANGFUSE_INIT_PROJECT_ID: main
      LANGFUSE_INIT_PROJECT_NAME: local-llm

  searxng:
    image: searxng/searxng:2026.6.26-f8ffbf36f
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT}:8080"
    volumes:
      - ${REPO_PATH}/config/searxng:/etc/searxng:rw
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: none

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${N8N_PORT}:5678"
    volumes:
      - ${REPO_PATH}/tools/n8n-data:/home/node/.n8n
    environment:
      N8N_HOST: localhost
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:${N8N_PORT}
      N8N_ENCRYPTION_KEY: local-llm-n8n-key
      GENERIC_TIMEZONE: ${N8N_TIMEZONE:-UTC}
