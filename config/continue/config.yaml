# Continue.dev config (2026 YAML format; config.json is deprecated).
# Per-role model assignment — no code. Copy or symlink this to ~/.continue/config.yaml
# (PowerShell: New-Item -ItemType SymbolicLink -Path $HOME\.continue\config.yaml -Target C:\bob\config\continue\config.yaml)
name: bob
version: 0.0.1
schema: v1

models:
  - name: coder
    provider: openai
    model: coder                 # -> llama-swap "coder" (Qwen2.5-Coder-14B Q4)
    apiBase: http://localhost:8081/v1
    apiKey: sk-local
    contextLength: 32768
    roles: [chat, edit, apply]
    systemMessage: "You are a skilled software engineer. Be direct. No preambles."
    defaultCompletionOptions: { temperature: 0.2, maxTokens: 8192 }

  - name: planner
    provider: openai
    model: planner               # -> llama-swap "planner" (Qwen3-30B-A3B Q4, thinking ON)
    apiBase: http://localhost:8081/v1
    apiKey: sk-local
    contextLength: 16384
    roles: [chat, edit]
    defaultCompletionOptions: { temperature: 0.3, maxTokens: 8192 }

  - name: chat
    provider: openai
    model: chat                  # -> llama-swap "chat" (Qwen3-14B Q4)
    apiBase: http://localhost:8081/v1
    apiKey: sk-local
    contextLength: 32768
    roles: [chat]
    systemMessage: "Be concise. /no_think"
    defaultCompletionOptions: { temperature: 0.7, maxTokens: 4096 }

  - name: vision
    provider: openai
    model: vision                # -> LiteLLM -> llama-swap "vision" (Qwen2-VL-7B)
    apiBase: http://localhost:8081/v1
    apiKey: sk-local
    contextLength: 4096
    roles: [chat]
    systemMessage: "You are a vision assistant. Describe images concisely and answer questions about them directly."
    defaultCompletionOptions: { temperature: 0.2, maxTokens: 512 }

  - name: autocomplete
    provider: openai
    model: fim                   # -> llama-swap "fim" (Qwen2.5-Coder-3B, always pinned)
    apiBase: http://localhost:8081/v1
    apiKey: sk-local
    contextLength: 8192
    roles: [autocomplete]

  - name: embeddings
    provider: openai
    model: embed                 # -> llama-swap "embed" (BGE-M3, always pinned)
    apiBase: http://localhost:8081/v1
    apiKey: sk-local
    roles: [embed]

  - name: chat-pro
    provider: openai
    model: chat-pro              # -> LiteLLM -> DeepSeek V4
    apiBase: http://localhost:8081/v1
    apiKey: sk-local
    contextLength: 32768
    roles: [chat, edit]
    defaultCompletionOptions: { temperature: 0.6, maxTokens: 4096 }

  - name: coder-pro
    provider: openai
    model: coder-pro             # -> LiteLLM -> DeepSeek V4
    apiBase: http://localhost:8081/v1
    apiKey: sk-local
    contextLength: 32768
    roles: [chat, edit, apply]
    defaultCompletionOptions: { temperature: 0.2, maxTokens: 4096 }

  - name: planner-pro
    provider: openai
    model: planner-pro           # -> LiteLLM -> DeepSeek R1 (thinking model; 600s timeout)
    apiBase: http://localhost:8081/v1
    apiKey: sk-local
    contextLength: 32768
    roles: [chat]
    defaultCompletionOptions: { maxTokens: 8192 }

mcpServers:
  - name: filesystem
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "C:\\Users\\vsiva\\dev"
      - "C:\\bob"
  - name: fetch
    command: uvx
    args:
      - "mcp-server-fetch"
  - name: github
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
  - name: searxng-search
    command: npx
    args:
      - "-y"
      - "mcp-searxng"
    env:
      SEARXNG_URL: "http://localhost:8888"
