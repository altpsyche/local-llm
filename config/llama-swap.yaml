# llama-swap config — one OpenAI-compatible endpoint, models hot-swapped on demand.
# Adding/retuning a model = edit this file. No code.
# NOTE: model paths are absolute and assume the repo lives at C:\local-llm.
#       If you clone elsewhere, update the paths below (or keep the canonical location).

macros:
  srv: "C:/local-llm/bin/llama-server.exe --port ${PORT} -ngl 99 --flash-attn on"
  kv:  "--cache-type-k q8_0 --cache-type-v q8_0"

models:
  planner:                                    # strong reasoning model for planning (aider architect, deep tasks)
    cmd: "${srv} -m C:/local-llm/models/qwen3-30b-a3b-q4.gguf -c 16384 ${kv} --temp 0.3"

  coder:                                      # coding chat + agentic edits (Cline, Continue chat/edit)
    cmd: "${srv} -m C:/local-llm/models/qwen-coder-14b-q4_k_m.gguf -c 16384 ${kv}"

  chat:                                       # general chat / reasoning
    cmd: "${srv} -m C:/local-llm/models/qwen3-14b-q4_k_m.gguf -c 16384 ${kv}"
    filters:
      setParams: { temperature: 0.7, top_p: 0.9 }   # enforce sampling server-side

  fim:                                        # fast autocomplete (FIM); pinned so it never unloads
    cmd: "${srv} -m C:/local-llm/models/qwen-coder-3b-q8_0.gguf -c 8192"
    ttl: 0

  embed:                                      # RAG embeddings; pinned
    cmd: "${srv} -m C:/local-llm/models/bge-m3-q8_0.gguf --embedding"
    ttl: 0

groups:
  # Only one big model resident at a time; loading another in the group evicts the current one.
  # fim + embed are NOT in the group (ttl:0) so they stay pinned alongside whichever big model is active.
  ondemand:
    swap: true
    members: [planner, coder, chat]
